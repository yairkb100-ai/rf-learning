<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width=720 height=420 direction="rtl"><rect width=720 height=420 fill=#ffffff/><text x=360 y=32 font-family='Heebo, Arial, sans-serif' font-size=21 fill=#1c1d1f text-anchor=middle font-weight=700>חלקי מנוע בעירה פנימית (חתך)</text><rect x=270 y=70 width=180 height=210 rx=8 fill=#eef0f2 stroke=#9aa0a6 stroke-width=2/><rect x=320 y=80 width=80 height=150 fill=#dfe7ff stroke=#3d7bff stroke-width=2/><rect x=325 y=150 width=70 height=40 rx=4 fill=#a435f0/><line x1=360 y1=190 x2=360 y2=300 stroke=#7a2bbf stroke-width=8 stroke-linecap=round/><circle cx=360 cy=315 r=30 fill=#fff3e0 stroke=#ff8a3d stroke-width=3/><circle cx=360 cy=315 r=6 fill=#ff8a3d/><line x1=335 y1=70 x2=335 y2=95 stroke=#1e8e3e stroke-width=5/><line x1=385 y1=70 x2=385 y2=95 stroke=#d23f3f stroke-width=5/><line x1=360 y1=60 x2=360 y2=80 stroke=#555 stroke-width=4/><circle cx=360 cy=58 r=5 fill=#555/><line x1=360 y1=58 x2=560 y2=58 stroke=#555 stroke-width=1.5/><text x=560 y=74 font-family='Heebo, Arial, sans-serif' font-size=13 fill=#1c1d1f text-anchor=start font-weight=400>מצת (Spark Plug)</text><line x1=335 y1=82 x2=160 y2=80 stroke=#1e8e3e stroke-width=1.5/><text x=160 y=74 font-family='Heebo, Arial, sans-serif' font-size=13 fill=#1c1d1f text-anchor=end font-weight=400>שסתום יניקה</text><line x1=385 y1=82 x2=560 y2=95 stroke=#d23f3f stroke-width=1.5/><text x=560 y=111 font-family='Heebo, Arial, sans-serif' font-size=13 fill=#1c1d1f text-anchor=start font-weight=400>שסתום פליטה</text><line x1=360 y1=170 x2=560 y2=170 stroke=#a435f0 stroke-width=1.5/><text x=560 y=186 font-family='Heebo, Arial, sans-serif' font-size=13 fill=#1c1d1f text-anchor=start font-weight=400>בוכנה (Piston)</text><line x1=360 y1=240 x2=160 y2=240 stroke=#7a2bbf stroke-width=1.5/><text x=160 y=256 font-family='Heebo, Arial, sans-serif' font-size=13 fill=#1c1d1f text-anchor=end font-weight=400>טלטל (Connecting Rod)</text><line x1=360 y1=345 x2=560 y2=330 stroke=#ff8a3d stroke-width=1.5/><text x=560 y=324 font-family='Heebo, Arial, sans-serif' font-size=13 fill=#1c1d1f text-anchor=start font-weight=400>גל ארכובה (Crankshaft)</text><line x1=330 y1=150 x2=160 y2=150 stroke=#3d7bff stroke-width=1.5/><text x=160 y=166 font-family='Heebo, Arial, sans-serif' font-size=13 fill=#1c1d1f text-anchor=end font-weight=400>צילינדר (Cylinder)</text><text x=360 y=400 font-family='Heebo, Arial, sans-serif' font-size=14 fill=#555 text-anchor=middle font-weight=400>הבוכנה נעה מעלה-מטה (תנועה קווית) → הטלטל וגל הארכובה ממירים לתנועה סיבובית</text></svg>